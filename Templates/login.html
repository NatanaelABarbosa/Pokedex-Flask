{% extends "template.html" %}
{% block content %}
    <form id="pokemonForm" method="POST">
        {{ form.csrf_token() }}
        <input type="hidden" name="proxima" value="{{ proxima }}">
        <div class="mb-3">
            {{ form.nickname.label(class="form-label") }}
            {{ form.nickname(class="form-control") }}
        </div>
        <div class="mb-3">
            {{ form.password.label(class="form-label") }}
            {{ form.password(class="form-control") }}
        </div>
        <button type="submit" class="btn btn-primary w-100">Logar</button>
    </form>
{% endblock %}
