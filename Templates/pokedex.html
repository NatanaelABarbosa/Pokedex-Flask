{% extends "template.html" %}
{% block content %}
    <div class="container mt-5">
        <table class="table table-striped table-bordered">
            <thead class="thead-dark">
                <tr>
                    <th scope="col">Nome</th>
                    <th scope="col">Tipo</th>
                    <th scope="col">Habilidade</th>
                    <th scope="col">Ações</th>
                </tr>
            </thead>
            <tbody>
                {% for pokemon in pokemons %}
                    <tr>
                        <td>{{ pokemon.nome }}</td>
                        <td>{{ pokemon.tipo }}</td>
                        <td>{{ pokemon.abilidade }}</td>
                        <td> 
                            <a class="btn btn-primary" href="{{ url_for('edit', id=pokemon.id) }}">E</a>
                        </td>
                    </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

    <a class="btn btn-dark mt-2" href="{{ url_for('create') }}">Adicionar pokemon</a>
{% endblock %}
