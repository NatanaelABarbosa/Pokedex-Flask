{% extends "template.html" %}
{% block content %}
    <div class="container mt-5">
        <table class="table table-striped table-bordered">
            <thead class="thead-dark">
                <tr>
                    <th scope="col">Nome</th>
                    <th scope="col">Tipos</th>
                    <th scope="col">Habilidade</th>
                    <th scope="col">Ações</th>
                </tr>
            </thead>
            <tbody>
                {% for pokemon in pokemons %}
                    <tr>
                        <td>{{ pokemon.name }}</td>
                        <td>{{ pokemon.type_1 }}, {{ pokemon.type_2 }}</td>
                        <td>{{ pokemon.ability }}</td>
                        <td class="d-flex"> 
                            <a class="btn btn-primary me-2" href="{{ url_for('edit', id=pokemon.id) }}">E</a>
                            <form method="POST" action="{{ url_for('delete', id=pokemon.id) }}">
                                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                                <input type="hidden" name="_method" value="DELETE">
                                <button class="btn btn-danger" type="submit">X</button>
                            </form>
                        </td>
                    </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

    <a class="btn btn-dark mt-2" href="{{ url_for('create') }}">Adicionar pokemon</a>
{% endblock %}
